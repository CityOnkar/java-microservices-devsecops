            claimName: mysql-order-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-order-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

# Microservices deployments
# example for one service; clone for others with appropriate names and ports
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: user-service:latest  # change to your registry tag
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "mysql-user"
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              value: "user"
            - name: DB_PASSWORD
              value: "password"
            - name: PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector:
    app: user-service
  ports:
    - port: 8080
      targetPort: 8080

# Repeat the above deployment+service blocks for order-service, inventory-service,
# auth-service, notification-service, shipping-service, analytics-service,
# gateway-service, config-service. Adjust image names and environment variables
# accordingly.
