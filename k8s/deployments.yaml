apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-order
spec:
  selector:
    matchLabels:
      app: mysql-order
  template:
    metadata:
      labels:
        app: mysql-order
    spec:
      containers:
        - name: mysql-order
