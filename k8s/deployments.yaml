# Kubernetes manifests for databases and microservices

# MySQL databases (userdb and orderdb)
apiVersion: v1
kind: Service
metadata:
  name: mysql-user
spec:
  ports:
    - port: 3306
  clusterIP: None
  selector:
    app: mysql-user
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-user
spec:
  selector:
    matchLabels:
      app: mysql-user
  template:
    metadata:
      labels:
        app: mysql-user
    spec:
      containers:
        - name: mysql-user
          image: mysql:8
          env:
            - name: MYSQL_DATABASE
              value: "userdb"
            - name: MYSQL_USER
              value: "user"
            - name: MYSQL_PASSWORD
              value: "password"
            - name: MYSQL_ROOT_PASSWORD
              value: "root"
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: mysql-user-pvc
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-user-pvc
          persistentVolumeClaim:
            claimName: mysql-user-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-user-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# order database
apiVersion: v1
kind: Service
metadata:
  name: mysql-order
spec:
  ports:
    - port: 3306
  clusterIP: None
  selector:
    app: mysql-order
