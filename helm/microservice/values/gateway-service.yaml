name: gateway-service

image:
  repository: cityonkar/gateway-service
  tag: "git-6225dfb"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  path: /gateways


replicaCount: 1

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1024Mi"
