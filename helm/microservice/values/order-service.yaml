name: order-service

image:
  repository: cityonkar/order-service
  tag: "git-6225dfb"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

replicaCount: 1

env:
  DB_HOST: order-service-db.cepumyous0um.us-east-1.rds.amazonaws.com
  DB_PORT: "3306"
  DB_USER: orderdbuser


secrets:
  enabled: true
  name: order-db-secret
  data:
    DB_PASSWORD: "+&M=<InP[rsh<j>Z"

ingress:
  enabled: true
  path: /orders


resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1024Mi"

probes:
  startup:
    initialDelaySeconds: 45
    failureThreshold: 30
  readiness:
    initialDelaySeconds: 20
  liveness:
    initialDelaySeconds: 60
